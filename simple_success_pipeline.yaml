# PIPELINE DEFINITION
# Name: simple-success-pipeline
# Description: Auto-generated from notebook
components:
  comp-notebook-component:
    executorLabel: exec-notebook-component
deploymentSpec:
  executors:
    exec-notebook-component:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - notebook_component
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'sklearn' 'pandas'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.15.2'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef notebook_component():\n    \"\"\"Auto-generated component from\
          \ notebook cells.\"\"\"\n    import pandas as pd\n    from sklearn.ensemble\
          \ import RandomForestClassifier\n    from sklearn.model_selection import\
          \ train_test_split\n    # Load data\n    df = pd.read_csv('data.csv')\n\
          \    X = df.drop('target', axis=1)\n    y = df['target']\n    # Train model\n\
          \    X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)\n\
          \    model = RandomForestClassifier()\n    model.fit(X_train, y_train)\n\
          \    print(f'Accuracy: {model.score(X_test, y_test)}')\n\n"
        image: quay.io/modh/runtime-images:ubi9-python-3.11
pipelineInfo:
  description: Auto-generated from notebook
  name: simple-success-pipeline
root:
  dag:
    tasks:
      notebook-component:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-notebook-component
        taskInfo:
          name: notebook-component
schemaVersion: 2.1.0
sdkVersion: kfp-2.15.2
